services:
  app:
    build:
      context: .
      dockerfile: src/Nutrir.Web/Dockerfile
    networks:
      - elastic-network
      - db-network
      - seq-network
    ports:
      - "7100:8080"
    depends_on:
      - db
      - seq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-development}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-nutrir};Username=${POSTGRES_USER:-nutrir};Password=${POSTGRES_PASSWORD:-nutrir_dev}
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:5341
      - ElasticApm__ServerUrl=${ELASTIC_APM_SERVER_URL:-}
      - ElasticApm__ApiKey=${ELASTIC_APM_API_KEY:-}
      - ElasticApm__Environment=${ASPNETCORE_ENVIRONMENT:-development}
      - ElasticApm__OpenTelemetryBridgeEnabled=true
      - Elasticsearch__Url=${ELASTICSEARCH_URL:-}
      - Elasticsearch__ApiKey=${ELASTICSEARCH_API_KEY:-}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:-}
      - Smtp__SenderEmail=${SMTP_SENDER_EMAIL:-}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}

  db:
    image: postgres:17
    networks:
      - db-network
    ports:
      - "7103:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutrir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutrir_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nutrir}
    volumes:
      - pgdata:/var/lib/postgresql/data

  seq:
    image: datalust/seq:latest
    networks:
      - seq-network
    ports:
      - "7102:5341"
      - "7101:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"

volumes:
  pgdata:

networks:
  elastic-network:
    external: true
  db-network:
    external: false
  seq-network:
    external: false
